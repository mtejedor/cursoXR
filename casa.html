<!DOCTYPE html>
<html lang="es">
<head>
    <title>Casa A-Frame Sencilla</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    
    <a-scene background="color: #87CEEB">

        <!-- Suelo -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#3d8c40"></a-plane>

        <!-- Paredes -->
        <a-box position="0 2 0"   width="6" height="3" depth="0.3" color="#e6c9a0"></a-box>     <!-- Frente -->
        <a-box position="0 2 -6"  width="6" height="3" depth="0.3" color="#e6c9a0"></a-box>     <!-- Atrás -->
        <a-box position="-3 2 -3" width="0.3" height="3" depth="6" color="#deb97a"></a-box>    <!-- Izquierda -->
        <a-box position="3 2 -3"  width="0.3" height="3" depth="6" color="#deb97a"></a-box>    <!-- Derecha -->

        <!-- === TECHO A-FRAME (mejorado) === -->
        <!-- Techo izquierdo -->
        <a-entity 
            position="-0.1 5.3 -3" 
            rotation="0 0 35" 
            geometry="primitive: plane; width: 9; height: 8" 
            material="color: #c44; side: double"></a-entity>
        
        <!-- Techo derecho -->
        <a-entity 
            position="0.1 5.3 -3" 
            rotation="0 0 -35" 
            geometry="primitive: plane; width: 9; height: 8" 
            material="color: #c44; side: double"></a-entity>

        <!-- Puerta -->
        <a-box position="0 1.4 0.2" width="1" height="2" depth="0.1" color="#4a2c1f"></a-box>

        <!-- Ventanas -->
        <a-plane position="-2 2 0.2" width="1" height="1" color="#81d4fa" material="side: double"></a-plane>
        <a-plane position="2 2 0.2"  width="1" height="1" color="#81d4fa" material="side: double"></a-plane>

        <!-- Luces -->
        <a-light type="directional" position="10 20 10" intensity="0.8"></a-light>
        <a-light type="point" position="0 3 -2" intensity="0.5" color="#ffeecc"></a-light>

        <!-- Cámara -->
        <a-camera position="10 3 12" wasd-controls look-controls></a-camera>

    </a-scene>
</body>
</html>
