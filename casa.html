<html>
<head>
    <title>Casa A-Frame Sencilla</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #87CEEB">
        <!-- Suelo con textura -->
        <a-assets>
            <img id="suelo" src="suelo.jpg">
            <img id="fondo" src="fondo.jpg">
        </a-assets> 
        <a-plane 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="30" 
            height="30" 
            src="#suelo">
        </a-plane>
        <!-- Paredes -->
        <a-box position="0 2 0"   width="6" height="3" depth="0.3" color="#e6c9a0"></a-box><!--Frente -->
        <a-box position="0 2 -6"  width="6" height="3" depth="0.3" color="#e6c9a0"></a-box><!--Atrás -->
        <a-box position="-3 2 -3" width="0.3" height="3" depth="6" color="#deb97a"></a-box><!--Izqu -->
        <a-box position="3 2 -3"  width="0.3" height="3" depth="6" color="#deb97a"></a-box><!--Derecha -->
        <!-- Techo izquierdo -->
        <a-box 
            position="-1.8 5.1 -3" 
            rotation="0 0 35" 
            width="5" 
            height="0.4" 
            depth="8" 
            color="#c44"></a-box>
        <!-- Techo derecho -->
        <a-box 
            position="1.8 5.1 -3" 
            rotation="0 0 -35" 
            width="5" 
            height="0.4" 
            depth="8" 
            color="#c44"></a-box>
        <!-- Puerta -->
        <a-box position="0 1.4 0.2" width="1" height="2" depth="0.1" color="#4a2c1f"></a-box>
        <!-- Ventanas opacas -->
        <a-plane position="-2 2 0.2" width="1" height="1" 
                 material="color: #2a7da8; side: double; transparent: false"></a-plane>
        <a-plane position="2 2 0.2" width="1" height="1" 
                 material="color: #2a7da8; side: double; transparent: false"></a-plane>
        <!-- Cámara dentro de la casa -->
        <a-camera position="0 1.8 -3"></a-camera>
        <a-sky src="#fondo"></a-sky>
    </a-scene>
</body>
</html>
