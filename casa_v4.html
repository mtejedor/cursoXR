<!DOCTYPE html>
<html>
<head>
    <title>Casa A-Frame con Bandera - Amanecer</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <!-- Entorno ajustado para amanecer -->
        <a-entity environment="preset: forest; skyType: atmosphere; lighting: none"></a-entity>

        <!-- ========== LUCES DEL AMANECER ========== -->
        
        <!-- 1. Luz ambiental tenue (luz general suave del amanecer) -->
        <a-entity light="type: ambient; color: #FF8C42; intensity: 0.3"></a-entity>
        
        <!-- 2. Luz direccional del sol naciente (bajo en el horizonte, luz dorada cálida) -->
        <a-entity light="type: directional; color: #FFD700; intensity: 0.8; castShadow: true" position="-20 5 30"></a-entity>
        
        <!-- 3. Luz direccional secundaria (relleno azulado del cielo matutino) -->
        <a-entity light="type: directional; color: #87CEEB; intensity: 0.2" position="10 15 -10"></a-entity>
        
        <!-- 4. Spotlight desde la ventana izquierda (luz del sol entrando) -->
        <a-entity light="type: spot; color: #FFE4B5; intensity: 1.2; angle: 35; penumbra: 0.4; castShadow: true" 
            position="-3 2 8" rotation="-15 0 0" target="#suelo-casa">
        </a-entity>
        
        <!-- 5. Point light en la puerta (linterna/luz de entrada) -->
        <a-entity light="type: point; color: #FFA500; intensity: 0.6; distance: 8; decay: 2" position="0 2.5 5"></a-entity>
        
        <!-- 6. Linear light decorativa en el porche (tira de luz) -->
        <a-entity light="type: ambient; color: #FFE4E1; intensity: 0.15"></a-entity>
        
        <!-- 7. Spotlight en la bandera (iluminación dramática) -->
        <a-entity light="type: spot; color: #FFFFFF; intensity: 0.8; angle: 25; penumbra: 0.3" 
            position="0 7 5" rotation="-45 0 0" target="#bandera">
        </a-entity>

        <!-- Casa principal -->
        <a-entity position="0 0 -10">
            <!-- Suelo de la casa (target del spotlight) -->
            <a-plane id="suelo-casa" position="0 0 0" rotation="-90 0 0" width="12" height="10" color="#8B7355" opacity="0.8"></a-plane>
            
            <!-- Paredes de la casa -->
            <a-box position="0 2 0" width="10" height="4" depth="8" color="#F5DEB3" shadow="receive: true"></a-box>

            <!-- Techo -->
            <a-cone position="0 5.5 0" radius-bottom="7.5" height="3.5" color="#8B4513" segments-radial="4" rotation="0 45 0" shadow="receive: true"></a-cone>

            <!-- Puerta -->
            <a-box position="0 1 4.1" width="2" height="3" depth="0.2" color="#654321" shadow="receive: true"></a-box>
            <a-sphere position="-0.7 1 4.25" radius="0.1" color="#FFD700"></a-sphere>

            <!-- Ventanas -->
            <a-box position="-3 2 4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.7" transparent="true"></a-box>
            <a-box position="3 2 4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.7" transparent="true"></a-box>
            <a-box position="-3 2 -4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.7" transparent="true"></a-box>
            <a-box position="3 2 -4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.7" transparent="true"></a-box>

            <!-- Chimenea -->
            <a-box position="3 6.5 -2" width="1" height="2.5" depth="1" color="#8B0000"></a-box>

            <!-- Porche -->
            <a-box position="0 0.2 5" width="4" height="0.4" depth="2" color="#8B4513"></a-box>
            <a-cylinder position="-1.5 0.5 5.5" radius="0.15" height="1" color="#654321"></a-cylinder>
            <a-cylinder position="1.5 0.5 5.5" radius="0.15" height="1" color="#654321"></a-cylinder>

            <!-- Mástil de la bandera -->
            <a-cylinder position="0 9 0" radius="0.08" height="4" color="#C0C0C0"></a-cylinder>
            <a-sphere position="0 11 0" radius="0.15" color="#FFD700"></a-sphere>

            <!-- Bandera ondeando -->
            <a-entity id="bandera" position="0 10.5 0">
                <a-plane position="1 0 0" width="2.5" height="1.5" color="#FF0000" side="double" 
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine">
                </a-plane>
                <a-plane position="1 0 0.01" width="2.5" height="1.5" color="#FFFFFF" side="double"
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine; delay: 100">
                </a-plane>
                <a-plane position="1 0 0.02" width="2.5" height="1.5" color="#0000FF" side="double"
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine; delay: 200">
                </a-plane>
            </a-entity>
        </a-entity>

        <!-- Árboles decorativos -->
        <a-entity position="-12 0 -8">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>

        <a-entity position="12 0 -6">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>

        <a-entity position="-10 0 5">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>

        <!-- Cámara con controles de movimiento WASD -->
        <a-entity camera look-controls wasd-controls="acceleration: 100" position="0 2 8"></a-entity>
    </a-scene>
</body>
</html>
