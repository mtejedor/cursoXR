<html>
<head>
    <title>Casa A-Frame con Bandera</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #87CEEB" xr-mode-ui="XRMode: xr">
        <!-- Suelo con textura -->
        <a-assets>
            <img id="suelo" src="suelo.jpg">
            <img id="fondo" src="fondo.jpg">
        </a-assets> 

        <!-- Suelo -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" src="#suelo"></a-plane>

        <!-- Casa principal -->
        <a-entity position="0 2 -10">
            <!-- Paredes de la casa -->
            <a-box position="0 0 0" width="8" height="4" depth="6" color="#F5DEB3"></a-box>

            <!-- Techo -->
            <a-cone position="0 3 0" radius-bottom="6" height="3" color="#8B4513" segments-radial="4" rotation="0 45 0"></a-cone>

            <!-- Puerta -->
            <a-box position="0 -1 3.1" width="1.5" height="2.5" depth="0.2" color="#654321"></a-box>

            <!-- Ventanas -->
            <a-box position="-2.5 0.5 3.1" width="1.5" height="1.5" depth="0.2" color="#87CEEB"></a-box>
            <a-box position="2.5 0.5 3.1" width="1.5" height="1.5" depth="0.2" color="#87CEEB"></a-box>

            <!-- Chimenea -->
            <a-box position="2 4.5 -1" width="0.8" height="2" depth="0.8" color="#8B0000"></a-box>

            <!-- Mástil de la bandera -->
            <a-cylinder position="0 6.5 0" radius="0.1" height="3" color="#C0C0C0"></a-cylinder>

            <!-- Bandera ondeando -->
            <a-entity position="0 7.5 0" animation="property: rotation; to: 0 5 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
                <a-plane position="0.8 0 0" width="2" height="1.2" color="#FF0000" side="double"></a-plane>
                <a-plane position="0.8 0 0.01" width="2" height="1.2" color="#FFFFFF" side="double"></a-plane>
                <a-plane position="0.8 0 0.02" width="2" height="1.2" color="#0000FF" side="double"></a-plane>
            </a-entity>
        </a-entity>

        <!-- Árboles decorativos -->
        <a-entity position="-8 0 -8">
            <a-cylinder position="0 1 0" radius="0.3" height="2" color="#8B4513"></a-cylinder>
            <a-cone position="0 3 0" radius-bottom="2" height="3" color="#228B22"></a-cone>
        </a-entity>

        <a-entity position="8 0 -6">
            <a-cylinder position="0 1 0" radius="0.3" height="2" color="#8B4513"></a-cylinder>
            <a-cone position="0 3 0" radius-bottom="2" height="3" color="#228B22"></a-cone>
        </a-entity>

        <!-- Cámara y Controles en una entidad -->
        <a-entity movement-controls="fly: true" position="0 2 5" rotation="0 0 0">
            <a-camera look-controls wasd-controls="acceleration: 100"></a-camera>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity> 
        </a-entity>
        <a-sky src="#fondo" hide-on-enter-ar></a-sky>
    </a-scene>
</body>
</html>
