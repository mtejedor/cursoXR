<!DOCTYPE html>
<html>
<head>
    <title>Casa A-Frame - Ciclo Día/Noche Simple</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <!-- Entorno base -->
        <a-entity environment="preset: forest; skyType: atmosphere; lighting: none; groundColor: #2d4a1e"></a-entity>

        <!-- ========== SOL CON ANIMACIÓN CÍCLICA ========== -->
        <!-- Se mueve en arco: amanecer → día → atardecer → noche → amanecer -->
        <a-entity 
            id="sol-rig"
            position="0 0 0"
            animation="property: rotation; from: 0 0 0; to: 0 0 360; loop: true; dur: 10000; easing: linear">
            
            <!-- El sol orbita a distancia -->
            <a-entity position="50 0 0">
                <!-- Esfera del sol -->
                <a-sphere 
                    radius="3" 
                    color="#FFD700" 
                    shader="flat"
                    animation="property: color; from: #FF4500; to: #FFD700; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
                    animation__2="property: color; from: #FFD700; to: #FF4500; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine">
                </a-sphere>
                <!-- Glow -->
                <a-sphere radius="4.5" color="#FFA500" opacity="0.3" transparent="true" shader="flat"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- Luz del sol que sigue la esfera -->
        <a-entity 
            light="type: directional; color: #FFD700; intensity: 1; castShadow: true"
            animation="property: rotation; from: 0 0 0; to: 0 0 360; loop: true; dur: 10000; easing: linear">
            <a-entity position="50 0 0"></a-entity>
        </a-entity>

        <!-- Luz ambiental que cambia con el ciclo -->
        <a-entity 
            light="type: ambient; color: #606080; intensity: 0.4"
            animation="property: light.color; from: #4a3a5a; to: #606080; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__2="property: light.color; from: #606080; to: #1a1a2e; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__3="property: light.intensity; from: 0.25; to: 0.5; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__4="property: light.intensity; from: 0.5; to: 0.08; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-entity>

        <!-- Luz de hemisferio (cielo) -->
        <a-entity 
            light="type: hemisphere; color: #87CEEB; groundColor: #2d4a1e; intensity: 0.4"
            animation="property: light.color; from: #FF8C42; to: #87CEEB; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__2="property: light.color; from: #87CEEB; to: #FF6347; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__3="property: light.intensity; from: 0.3; to: 0.5; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__4="property: light.intensity; from: 0.5; to: 0.1; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-entity>

        <!-- Cielo que cambia de color -->
        <a-sky 
            color="#87CEEB"
            animation="property: color; from: #FF8C42; to: #87CEEB; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
            animation__2="property: color; from: #87CEEB; to: #0a0a1a; dur: 2500; delay: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sky>

        <!-- Casa principal -->
        <a-entity position="0 0 -10">
            <!-- Suelo -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="12" color="#8B7355" shadow="receive: true"></a-plane>
            
            <!-- Paredes -->
            <a-box position="0 2 0" width="10" height="4" depth="8" color="#F5DEB3" shadow="receive: true"></a-box>

            <!-- Techo -->
            <a-cone position="0 5.5 0" radius-bottom="7.5" height="3.5" color="#8B4513" segments-radial="4" rotation="0 45 0" shadow="receive: true"></a-cone>

            <!-- Puerta con SONIDO DE TIMBRE al hacer clic -->
            <a-box 
                id="puerta"
                position="0 1 4.1" 
                width="2" 
                height="3" 
                depth="0.2" 
                color="#654321" 
                shadow="receive: true"
                class="clickable"
                sound="src: url(audios/timbre.mp3); on: click; volume: 1">
            </a-box>
            
            <!-- Pomo de la puerta clickable -->
            <a-sphere 
                id="pomo"
                position="-0.7 1 4.25" 
                radius="0.1" 
                color="#FFD700"
                class="clickable"
                sound="src: url(audios/timbre.mp3); on: click; volume: 1">
            </a-sphere>

            <!-- Ventanas -->
            <a-box position="-3 2 4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.6" transparent="true"></a-box>
            <a-box position="3 2 4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.6" transparent="true"></a-box>
            <a-box position="-3 2 -4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.6" transparent="true"></a-box>
            <a-box position="3 2 -4.1" width="2" height="2" depth="0.2" color="#87CEEB" opacity="0.6" transparent="true"></a-box>

            <!-- Chimenea -->
            <a-box position="3 6.5 -2" width="1" height="2.5" depth="1" color="#8B0000"></a-box>

            <!-- Porche -->
            <a-box position="0 0.2 5" width="4" height="0.4" depth="2" color="#8B4513"></a-box>
            <a-cylinder position="-1.5 0.5 5.5" radius="0.15" height="1" color="#654321"></a-cylinder>
            <a-cylinder position="1.5 0.5 5.5" radius="0.15" height="1" color="#654321"></a-cylinder>

            <!-- Mástil de la bandera -->
            <a-cylinder position="0 9 0" radius="0.08" height="4" color="#C0C0C0"></a-cylinder>
            <a-sphere position="0 11 0" radius="0.15" color="#FFD700"></a-sphere>

            <!-- Bandera ondeando -->
            <a-entity position="0 10.5 0">
                <a-plane position="1 0 0" width="2.5" height="1.5" color="#FF0000" side="double" 
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine">
                </a-plane>
                <a-plane position="1 0 0.01" width="2.5" height="1.5" color="#FFFFFF" side="double"
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine; delay: 100">
                </a-plane>
                <a-plane position="1 0 0.02" width="2.5" height="1.5" color="#0000FF" side="double"
                    animation="property: scale; from: 1 1 1; to: 0.95 1 1; dir: alternate; dur: 800; loop: true; easing: easeInOutSine; delay: 200">
                </a-plane>
            </a-entity>

            <!-- Luz interior (se enciende de noche con la animación del cielo) -->
            <a-entity 
                light="type: point; color: #FFA500; intensity: 0; distance: 10; decay: 2" 
                position="0 2 0"
                animation="property: light.intensity; from: 0; to: 0; dur: 5000; loop: true; easing: linear"
                animation__2="property: light.intensity; from: 0; to: 0.8; dur: 2500; delay: 5000; loop: true; easing: easeInOutSine"
                animation__3="property: light.intensity; from: 0.8; to: 0; dur: 2500; delay: 7500; loop: true; easing: easeInOutSine">
            </a-entity>
        </a-entity>

        <!-- Árboles -->
        <a-entity position="-12 0 -8">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>
        <a-entity position="12 0 -6">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>
        <a-entity position="-10 0 5">
            <a-cylinder position="0 1.5 0" radius="0.4" height="3" color="#8B4513"></a-cylinder>
            <a-cone position="0 4.5 0" radius-bottom="2.5" height="4" color="#228B22"></a-cone>
        </a-entity>

        <!-- Cámara con cursor para poder hacer clic -->
        <a-entity position="0 2 15">
            <a-camera look-controls wasd-controls="acceleration: 100">
                <a-cursor color="#FFD700" scale="0.5 0.5 0.5"></a-cursor>
            </a-camera>
        </a-entity>
    </a-scene>
</body>
</html>
